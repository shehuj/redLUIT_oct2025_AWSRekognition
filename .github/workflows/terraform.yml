# This workflow installs the latest version of Terraform CLI and configures the Terraform CLI configuration file
# with an API token for Terraform Cloud (app.terraform.io). On pull request events, this workflow will run
# `terraform init`, `terraform fmt`, and `terraform plan` (speculative plan via Terraform Cloud). On push events
# to the "main" branch, `terraform apply` will be executed.
#
# Documentation for `hashicorp/setup-terraform` is located here: https://github.com/hashicorp/setup-terraform
#
# To use this workflow, you will need to complete the following setup steps.
#
# 1. Create a `main.tf` file in the root of this repository with the `remote` backend and one or more resources defined.
#   Example `main.tf`:
#     # The configuration for the `remote` backend.
#     terraform {
#       backend "remote" {
#         # The name of your Terraform Cloud organization.
#         organization = "example-organization"
#
#         # The name of the Terraform Cloud workspace to store Terraform state files in.
#         workspaces {
#           name = "example-workspace"
#         }
#       }
#     }
#
#     # An example resource that does nothing.
#     resource "null_resource" "example" {
#       triggers = {
#         value = "A example resource that does nothing!"
#       }
#     }
#
#
# 2. Generate a Terraform Cloud user API token and store it as a GitHub secret (e.g. TF_API_TOKEN) on this repository.
#   Documentation:
#     - https://www.terraform.io/docs/cloud/users-teams-organizations/api-tokens.html
#     - https://help.github.com/en/actions/configuring-and-managing-workflows/creating-and-storing-encrypted-secrets
#
# 3. Reference the GitHub secret in step using the `hashicorp/setup-terraform` GitHub Action.
#   Example:
#     - name: Setup Terraform
#       uses: hashicorp/setup-terraform@v1
#       with:
#         cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

name: "Terraform (Rekognition / Lambda Infra)"

on:
  pull_request:
    branches:
      - main
    paths:
      - "modules/**"
      - "envs/**"
      - "lambda_handler.py"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "modules/**"
      - "envs/**"
      - "lambda_handler.py"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  # If you want to comment on PR plans, enable pull-requests write permissions
  pull-requests: write

jobs:
  terraform:
    name: "Terraform Plan / Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform CLI
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.5.0"           # or whichever version you pin
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

    - name: Terraform fmt (check)
      run: terraform fmt -check

    - name: Terraform init
      run: terraform init

    - name: Terraform validate
      run: terraform validate

    - name: Terraform plan
      id: plan
      run: |
        # We output the plan to a file so we can examine or comment on it
        terraform plan -out=tfplan -input=false
      # On pull requests, continue even if plan errors (so we can comment)  
      continue-on-error: ${{ github.event_name == 'pull_request' }}

    - name: Show plan output
      if: github.event_name == 'pull_request'
      run: terraform show -no-color tfplan

    - name: Comment PR with plan (optional)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const plan = `\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``;
          const body = `### Terraform Plan 🔍\n${plan}`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          })

    - name: Fail if plan failed
      if: steps.plan.outcome == 'failure' && github.event_name == 'push'
      run: exit 1

    - name: Terraform apply (prod)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -input=false