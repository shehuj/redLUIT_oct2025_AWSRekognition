name: Analyze Images on Pull Request

on:
  pull_request:
    branches:
      - main
    paths:
      - "images/**"

jobs:
  analyze-images:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_BUCKET_PATH_BETA: ${{ secrets.S3_BUCKET_PATH_BETA }}
      DYNAMODB_TABLE_BETA: ${{ secrets.DYNAMODB_TABLE_BETA }}
      GITHUB_REF_NAME: ${{ github.event.pull_request.base.ref }}
      GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run beta image analysis
        run: python analyze_image/beta.py

      - name: List images directory (debug)
        run: ls -R images