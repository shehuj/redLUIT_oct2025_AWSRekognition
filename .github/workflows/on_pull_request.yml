name: Analyze Images on Pull Request

on:
  pull_request:
    branches:
      - main
    paths:
      - "images/**"

jobs:
  analyze-images:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      DYNAMODB_TABLE_BETA: ${{ secrets.DYNAMODB_TABLE_BETA }}
      GITHUB_REF_NAME: ${{ github.event.pull_request.base.ref }}
      GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run beta image analysis
        run: python analyze_image/beta.py

      - name: List images directory (debug)
        run: ls -R images

      - name: Debug environment variables
        run: |
          echo "GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "GITHUB_HEAD_REF: $GITHUB_HEAD_REF"
          echo "Base ref (github.event.pull_request.base.ref): ${{ github.event.pull_request.base.ref }}"
          echo "AWS_REGION: $AWS_REGION"
          echo "S3_BUCKET: $S3_BUCKET"
          echo "DYNAMODB_TABLE_BETA: $DYNAMODB_TABLE_BETA"