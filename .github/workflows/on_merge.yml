name: Analyze Images on Merge

on:
  push:
    branches: [ main ]
    paths:
      - "images/**"

jobs:
  analyze-images-prod:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      GITHUB_REF_NAME: ${{ github.event.pull_request.base.ref }}
      S3_BUCKET_PATH_PROD: ${{ secrets.S3_BUCKET_PATH_PROD }}
      DYNAMODB_TABLE: ${{ secrets.DYNAMODB_TABLE_PROD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run image analysis
        run: python analyze_image/prod.py

      - name: List files for debugging
        run: ls -R images

      - name: Debug environment variables
        run: |
          echo "GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "S3_BUCKET_PATH_PROD: $S3_BUCKET_PATH_PROD"
          echo "AWS_REGION: $AWS_REGION"
          echo "S3_BUCKET: $S3_BUCKET"
          echo "DYNAMODB_TABLE: $DYNAMODB_TABLE" 
