name: Analyze Images on Merge

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "images/**"

jobs:
  analyze-images-prod:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      # You had “S3_BUCKET_PATH_PROD” — if you use it in your script, keep it; else you may remove.
      S3_BUCKET_PATH_PROD: ${{ secrets.S3_BUCKET_PATH_PROD }}
      DYNAMODB_TABLE_PROD: ${{ secrets.DYNAMODB_TABLE_PROD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run production image analysis
        run: python analyze_image_prod.py

      - name: List images directory (debug)
        run: ls -R images

      - name: Debug environment variables
        run: |
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "S3_BUCKET: $S3_BUCKET"
          echo "S3_BUCKET_PATH_PROD: $S3_BUCKET_PATH_PROD"
          echo "AWS_REGION: $AWS_REGION"
          echo "DYNAMODB_TABLE_PROD: $DYNAMODB_TABLE_PROD"