name: "Terraform Plan (PR / Beta Preview)"

on:
  pull_request:
    branches:
      - main
    paths:
      - terraform/**"
      - "modules/**"
      - "envs/**"
      - "lambda_handler.py"
      - ".github/workflows/**"

permissions:
  id-token: write      # needed for OIDC
  contents: read       # to check out code


env: 
    TF_IN_AUTOMATION: true
    AWS_REGION: ${{ secrets.AWS_REGION }}
    AWS_GITHUB_OIDC_ROLE_ARN: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  terraform:
    name: Terraform Plan (PR)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ env.AWS_GITHUB_OIDC_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Setup Terraform CLI
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.5.0"

    - name: Terraform fmt check
      run: terraform fmt -check

    - name: Terraform init
      run: terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=beta/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

    - name: Terraform validate
      run: terraform validate

    - name: Terraform plan (beta)
      id: plan
      run: terraform plan -out=tfplan -input=false \
           -var="environment=beta"
      continue-on-error: true

    - name: Show plan (PR comment)
      if: github.event_name == 'pull_request'
      run: terraform show -no-color tfplan

    - name: Comment PR with plan
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ env.GITHUB_TOKEN }}
        script: |
          const plan = `\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``;
          const body = `### Terraform Beta Plan\n${plan}`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          })